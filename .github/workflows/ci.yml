name: CI/CD

# Pipeline em três estágios encadeados:
#   test  → lint, typecheck e testes unitários
#   build → constrói a imagem Docker (valida em PR; publica a tag imutável sha-… em push)
#   deploy → promove a imagem publicada para latest / vX.Y (imagem no GHCR)
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Uma execução por ref: um novo push cancela a anterior ainda em andamento.
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ---- 1. Teste -----------------------------------------------------------
  test:
    name: Teste
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Testes
        run: npm test -- --ci

  # ---- 2. Build -----------------------------------------------------------
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Só autentica em push (PR de fork não tem permissão de escrita no GHCR).
      - name: Login no GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Tag imutável por commit; identifica exatamente o que foi construído.
          tags: |
            type=sha,prefix=sha-,format=long

      - name: Build (e push em push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          # Em PR apenas constrói para validar o Dockerfile; em push publica.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- 3. Deploy ----------------------------------------------------------
  # "Deploy" aqui = publicar a imagem no GHCR sob as tags de release (latest /
  # vX.Y.Z), promovendo o digest exato construído no estágio anterior — sem
  # reconstruir. O ambiente "production" permite exigir aprovação manual.
  deploy:
    name: Deploy
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    env:
      # Mapear o secret para env permite pular o deploy na VPS até ela estar
      # configurada (não dá para checar `secrets` direto num `if:`).
      SSH_HOST: ${{ secrets.SSH_HOST }}
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags de release
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Promover imagem para as tags de release
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          SOURCE: ${{ env.IMAGE }}@${{ needs.build.outputs.digest }}
        run: |
          args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && args+=(--tag "$tag")
          done <<< "$TAGS"
          echo "Promovendo $SOURCE →"
          printf '  %s\n' "${args[@]}"
          docker buildx imagetools create "${args[@]}" "$SOURCE"

      # ---- Deploy real na VPS (só em push na main e se a VPS estiver configurada) ----
      # Requer os secrets do environment `production`: SSH_HOST, SSH_USER, SSH_KEY
      # (chave privada) e, opcionalmente, SSH_PORT. Enquanto não existirem, os
      # passos abaixo são pulados e o pipeline segue verde.
      - name: Checkout (arquivos de deploy)
        if: env.SSH_HOST != '' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v4

      - name: Copiar compose para a VPS
        if: env.SSH_HOST != '' && github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy/docker-compose.yml"
          target: "~/bancada"
          strip_components: 1 # remove o prefixo deploy/ → arquivo fica em ~/bancada/

      - name: Atualizar container na VPS
        if: env.SSH_HOST != '' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ~/bancada
            docker compose pull
            docker compose up -d
            docker image prune -f
