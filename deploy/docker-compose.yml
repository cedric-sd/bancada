# Compose de produção da Bancada — roda na VPS.
# O CI copia este arquivo para ~/bancada/ e executa
#   docker compose pull && docker compose up -d
# Os segredos ficam num .env ao lado (ver .env.example), nunca no repositório.
#
# HTTPS/proxy: integra-se a um Traefik já existente (provider Docker, por labels).
# O container não publica portas — o Traefik alcança o app em :3000 e cuida do TLS.

services:
  app:
    image: ghcr.io/cedric-sd/bancada:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - bancada-data:/app/data # persiste o SQLite (WAL + sidecars)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bancada.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.bancada.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.bancada.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.bancada.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  bancada-data:
